name: terraform-ci

on:
    pull_request:
        paths:
            - "terraform/**"

permissions:
    id-token: write
    contents: read
    pull-requests: write

env:
    AWS_REGION: us-east-1

jobs:
    plan:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/gha-terraform
                  aws-region: ${{ env.AWS_REGION }}

            - uses: hashicorp/setup-terraform@v3
              with:
                  terraform_version: "1.9.0"

            - name: Terraform Init
              run: terraform -chdir=terraform/envs/dev init

            - name: Terraform Plan
              run: terraform -chdir=terraform/envs/dev plan -no-color | tee plan.txt
              continue-on-error: true

            - name: Post plan to PR
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      const plan = fs.readFileSync('plan.txt', 'utf8').slice(0, 60000);
                      github.rest.issues.createComment({
                        ...context.repo,
                        issue_number: context.payload.pull_request.number,
                        body: '### Terraform Plan\n```hcl\n' + plan + '\n```'
                      });
